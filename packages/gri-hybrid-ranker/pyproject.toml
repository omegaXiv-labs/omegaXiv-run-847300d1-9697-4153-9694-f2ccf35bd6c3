[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omegaxiv-gri-hybrid-ranker"
version = "0.1.0"
description = "Reusable hybrid tri-state ranking pipeline for glucose-responsive insulin candidate prioritization."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "omegaXiv" }
]
license = { text = "Proprietary - omegaXiv workspace artifact" }
dependencies = [
  "numpy>=1.26,<3",
  "pandas>=2.1,<3",
  "sympy>=1.12,<2"
]
keywords = ["glucose-responsive-insulin", "ranking", "computational-biology", "tri-state"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "License :: Other/Proprietary License",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Bio-Informatics"
]

[project.urls]
Homepage = "https://omegaxiv.org"

[project.optional-dependencies]
plot = [
  "matplotlib>=3.8,<4",
  "seaborn>=0.13,<0.14"
]
dev = [
  "pytest>=8.2,<9",
  "ruff>=0.6,<1",
  "mypy>=1.11,<2"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
